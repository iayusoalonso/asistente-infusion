<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guía de Infusión Autónoma</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Prevención de bloqueo de pantalla -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    
    <!-- Estilos independientes -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <button id="headerNavBtn" class="btn-nav hidden">←</button>
        
        <!-- Selector de Idioma -->
        <div class="lang-selector-container">
            <select id="langSelector" class="form-control" style="padding: 6px 12px; width: auto; font-size: 0.9rem;">
                <option value="es">Español 🇪🇸</option>
                <option value="en">English 🇬🇧</option>
            </select>
        </div>

        <div class="status-indicators">
            <span id="netStatusText" class="status-text-explanation hidden"></span>
            <div id="netStatusDot" class="status-dot"></div>
        </div>
    </header>

    <main class="main-container">

        <!-- VISTA 1: MENÚ PRINCIPAL -->
        <section id="view-menu" class="card">
            <div class="menu-header-row">
                <h2 data-i18n="menu_title">Procedimientos</h2>
                <div style="display: flex; gap: 6px;">
                    <button id="reorderMenuBtn" class="btn-action btn-secondary" data-i18n="btn_organize">↕️ Organizar</button>
                    <button id="btnNewRoutine" class="btn-action btn-primary" data-i18n="btn_new">+ Nuevo</button>
                </div>
            </div>
            <div id="menu-routines-container" class="routine-list"></div>
        </section>

        <!-- VISTA 2: CREADOR / EDITOR DE RUTINAS -->
        <section id="view-creator" class="card hidden">
            <h2 id="creatorTitle" style="margin-bottom: 16px;" data-i18n="creator_title_new">Configurar Rutina</h2>
            
            <div class="form-group">
                <label for="routineName" data-i18n="label_process_name">Nombre del Proceso</label>
                <input type="text" id="routineName" class="form-control" placeholder="...">
            </div>
            
            <div class="form-group">
                <label data-i18n="label_technical_steps">Pasos Técnicos</label>
                <div id="stepsBuilderContainer"></div>
                <button type="button" id="btnAddStepRow" class="btn-action" style="background:#e2e8f0; width:100%; margin-top:8px;" data-i18n="btn_add_step">
                    + Añadir Paso
                </button>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button id="btnSaveRoutine" class="btn-action btn-primary" style="flex:1;" data-i18n="btn_save">Guardar Cambios</button>
                <button id="btnCancelCreator" class="btn-action" style="background:#cbd5e1;" data-i18n="btn_cancel">Cancelar</button>
            </div>
        </section>

        <!-- VISTA 3: EJECUCIÓN -->
        <section id="view-execution" class="hidden" style="display:flex; flex-direction:column; flex:1; gap:16px;">
            <div id="sterileBanner" class="sterile-banner hidden" data-i18n="sterile_warning">⚠️ ATENCIÓN: PASO ESTÉRIL ⚠️</div>
            
            <div class="card display-card">
                <div id="currentStep" class="step-indicator">Paso 0 de 0</div>
                <h1 id="instruction" class="instruction-text">Cargando...</h1>
                
                <div id="volumeContainer" class="volume-helper hidden">
                    <span data-i18n="volume_infused">Infundido:</span> 
                    <span id="volCurrent">0.0</span> ml de <span id="volTotal">0</span> ml
                </div>

                <div id="timer" class="timer-display">00:00</div>
            </div>
            <button id="actionBtn" class="elbow-btn" type="button" data-i18n="btn_start">Iniciar</button>
        </section>

    </main>

    <!-- Lógica de la aplicación modular -->
    <script type="module" src="app.js"></script>
</body>
</html>
